<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Usage</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="card" id="card" data-tauri-drag-region>
      <!-- Header -->
      <header class="hd">
        <div class="mark">
          <img class="mark-img" src="mascot.png" alt="" />
          <span class="mark-name">Claude</span>
          <span class="mark-sub">usage</span>
        </div>
        <span class="pill" id="status-pill">
          <span class="dot" id="status-dot"></span>
          <span id="status-text">—</span>
        </span>
      </header>

      <!-- Hero gauge: session (5h) -->
      <section class="hero">
        <svg class="gauge" viewBox="0 0 200 200" aria-hidden="true">
          <defs>
            <linearGradient id="clayGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="var(--clay-bright)" />
              <stop offset="1" stop-color="var(--clay-deep)" />
            </linearGradient>
            <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
              <feGaussianBlur stdDeviation="4" result="b" />
              <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
            </filter>
          </defs>
          <circle class="track" cx="100" cy="100" r="84" />
          <circle class="prog" id="ring" cx="100" cy="100" r="84" filter="url(#glow)" />
        </svg>
        <div class="hero-center">
          <div class="hero-val" id="hero-val">—</div>
          <div class="hero-lbl">sessão · 5h</div>
        </div>
      </section>
      <div class="reset-line" id="hero-reset"></div>

      <hr class="rule" />

      <!-- Weekly (all models) -->
      <section class="weekly">
        <div class="row-lbl">
          <span>Semanal · todos modelos</span>
          <span class="row-val" id="weekly-val">—</span>
        </div>
        <div class="bar"><div class="bar-fill" id="weekly-fill"></div></div>
        <div class="reset-line center" id="weekly-reset"></div>
      </section>

      <hr class="rule" />

      <!-- Per-model weekly -->
      <section class="group">
        <div class="group-hd">semanal · por modelo</div>
        <div class="grid2">
          <div class="cell col"><span class="k">Sonnet</span><span class="v" id="s-sonnet">—</span></div>
          <div class="cell col"><span class="k">Opus</span><span class="v" id="s-opus">—</span></div>
        </div>
      </section>

      <footer class="ft">
        <span class="ft-model" id="ft-plan">—</span>
        <span class="ft-age" id="ft-age">—</span>
      </footer>
    </main>
    <script src="app.js"></script>
  </body>
</html>
